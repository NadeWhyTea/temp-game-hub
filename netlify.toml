[build]
  command = "npm run build"
  publish = "out"

[[redirects]]
  from = "/"
  to = "/home"
  status = 301

[[redirects]]
  from = "/home"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/games/:path"
  to = "/games/:path.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
